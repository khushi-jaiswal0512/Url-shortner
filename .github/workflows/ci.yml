name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test
        run: ./mvnw clean test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get
      - name: Analyze
        working-directory: ./frontend
        run: flutter analyze
      - name: Run tests
        working-directory: ./frontend
        run: flutter test || echo "No tests yet"
