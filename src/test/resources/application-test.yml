# ══════════════════════════════════════════════════════════
# Test Profile — Uses H2 in-memory DB, no Redis required
# ══════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379

# Disable Redis auto-config for tests (mocked in test classes)
spring.autoconfigure.exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

app:
  base-url: http://localhost:8080
  cache:
    ttl-hours: 24
  rate-limit:
    create-requests-per-minute: 10
    redirect-requests-per-minute: 100
  cors:
    allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health
