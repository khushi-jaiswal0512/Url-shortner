# ═══════════════════════════════════════════════════
# URL Shortener — Application Configuration
# Profiles: default | dev | docker | prod
# ═══════════════════════════════════════════════════

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: url-shortener

  # ── MySQL DataSource ──────────────────────────────
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:url_shortener}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # ── JPA / Hibernate ───────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ── Redis ─────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

  # ── Flyway (disabled by default; enabled in prod) ─
  flyway:
    enabled: false

  # ── Schema Init (disabled by default) ─────────────
  sql:
    init:
      mode: never

# ── Application-Specific Properties ────────────────
app:
  base-url: ${BASE_URL:http://localhost:8080}
  cache:
    ttl-hours: 24
  rate-limit:
    create-requests-per-minute: 10
    redirect-requests-per-minute: 100
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# ── Actuator (Health Checks) ───────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Logging ────────────────────────────────────────
logging:
  level:
    com.urlshortener: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN

# ── Springdoc / Swagger ───────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

---
# ═══════════════════════════════════════════════════
# Profile: dev
# ═══════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.urlshortener: DEBUG
    org.hibernate.SQL: DEBUG

---
# ═══════════════════════════════════════════════════
# Profile: docker
# ═══════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: docker
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update

---
# ═══════════════════════════════════════════════════
# Profile: prod
# ═══════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  sql:
    init:
      mode: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    com.urlshortener: INFO
